name: Release PR — version bump, label + changelog

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches:
      - master

permissions:
  pull-requests: write
  contents: write   # needed to push the version-bump commit

jobs:
  label_and_changelog:
    runs-on: ubuntu-latest
    # Only run for develop -> master PRs
    if: github.head_ref == 'develop' && github.base_ref == 'master'

    steps:
      # ── 1. Ensure the "release" label exists and add it ─────────────────────
      - name: Add release label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            // Create label if it doesn't exist yet (idempotent)
            try {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'release',
                color: '0075ca',
                description: 'Release to production',
              });
            } catch (e) {
              // 422 = already exists — ignore
              if (e.status !== 422) throw e;
            }

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: pr.number,
              labels: ['release'],
            });

      # ── 2. Checkout develop branch (full history) ───────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0   # full history needed for git log + push

      # ── 3. Bump version in package.json ─────────────────────────────────────
      # Runs on opened, reopened and synchronize.
      # The script itself guards against re-running when HEAD is already a bump commit.
      - name: Bump version and commit to develop
        if: |
          github.event.action == 'opened' ||
          github.event.action == 'reopened' ||
          github.event.action == 'synchronize'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');

            // Guard: if the HEAD commit on develop is already a bump, skip
            const headMsg = execSync('git log -1 --pretty=format:"%s" origin/develop').toString().trim();
            if (/^chore\(release\): bump version/.test(headMsg)) {
              console.log('HEAD is already a bump commit — skipping.');
              // Still expose the current version for the changelog step
              const pkgPath = path.join(process.env.GITHUB_WORKSPACE, 'frontend/package.json');
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              core.exportVariable('NEXT_VERSION', pkg.version);
              return;
            }

            // ── Determine bump type from commit subjects ──────────────────────
            const log = execSync(
              'git log origin/master..origin/develop --pretty=format:"%s" --no-merges'
            ).toString().trim();

            const lines = log ? log.split('\n') : [];
            let bump = 'patch';
            for (const subject of lines) {
              if (/^(\w+)(\(.*?\))?!:/.test(subject) || /BREAKING CHANGE/.test(subject)) {
                bump = 'major';
                break;
              }
              if (/^feat(\(.*?\))?:/.test(subject) && bump !== 'major') {
                bump = 'minor';
              }
            }
            console.log(`Bump type: ${bump}`);

            // ── Read current version ──────────────────────────────────────────
            const pkgPath = path.join(process.env.GITHUB_WORKSPACE, 'frontend/package.json');
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);

            let nextVersion;
            if (bump === 'major') nextVersion = `${major + 1}.0.0`;
            else if (bump === 'minor') nextVersion = `${major}.${minor + 1}.0`;
            else nextVersion = `${major}.${minor}.${patch + 1}`;

            console.log(`Version: ${pkg.version} → ${nextVersion}`);

            // ── Write new version ─────────────────────────────────────────────
            pkg.version = nextVersion;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

            // ── Commit and push to develop ────────────────────────────────────
            execSync('git config user.name  "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync(`git add frontend/package.json`);
            execSync(`git commit -m "chore(release): bump version to ${nextVersion} [skip ci]"`);
            execSync('git push origin develop');

            // ── Expose version for subsequent steps ───────────────────────────
            // `core` is already injected as a global by actions/github-script
            core.exportVariable('NEXT_VERSION', nextVersion);

      # ── 4. Read current version (fallback for edited event) ─────────────────
      - name: Read current version
        if: github.event.action == 'edited'
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "NEXT_VERSION=$VERSION" >> $GITHUB_ENV

      # ── 5. Build changelog and update PR description ────────────────────────
      - name: Generate changelog and update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const version = process.env.NEXT_VERSION;

            // Fetch latest refs so git log sees the bump commit if it was just pushed
            execSync('git fetch origin');

            // Commits in develop not yet in master (exclude auto bump commits)
            const log = execSync(
              'git log origin/master..origin/develop --pretty=format:"%H|%s|%an" --no-merges'
            ).toString().trim();

            if (!log) {
              console.log('No new commits found.');
              return;
            }

            // Group by conventional-commit prefix
            const groups = {};
            const LABELS = {
              feat:     '✨ Features',
              fix:      '🐛 Bug fixes',
              perf:     '⚡ Performance',
              refactor: '♻️  Refactor',
              test:     '🧪 Tests',
              docs:     '📝 Docs',
              chore:    '🔧 Chore',
              ci:       '👷 CI',
              style:    '💄 Style',
            };

            for (const line of log.split('\n')) {
              const [sha, subject, author] = line.split('|');
              // Skip auto-generated bump commits
              if (/^chore\(release\): bump version/.test(subject)) continue;
              const match = subject.match(/^(\w+)(\(.*?\))?!?:/);
              const type  = match ? match[1] : 'other';
              const key   = LABELS[type] ?? '📦 Other';
              if (!groups[key]) groups[key] = [];
              groups[key].push({ sha: sha.slice(0, 7), subject, author });
            }

            // Build markdown body
            let body = `## 🚀 Release \`v${version}\`\n\n`;
            body += `## 📋 Changelog\n\n`;
            body += `> Auto-generated from commits in \`develop\` not yet merged into \`master\`.\n\n`;

            for (const [section, commits] of Object.entries(groups)) {
              body += `### ${section}\n`;
              for (const { sha, subject, author } of commits) {
                body += `- [\`${sha}\`](../../commit/${sha}) ${subject} — _${author}_\n`;
              }
              body += '\n';
            }

            // Preserve any manually written content below the separator
            const existing = pr.body ?? '';
            const SEPARATOR = '<!-- changelog:end -->';
            const manualSection = existing.includes(SEPARATOR)
              ? existing.slice(existing.indexOf(SEPARATOR) + SEPARATOR.length)
              : '';

            const newBody = body + SEPARATOR + manualSection;

            await github.rest.pulls.update({
              owner, repo,
              pull_number: pr.number,
              body: newBody,
            });

            // Also update the PR title to include the version (if not already there)
            // Fetch the *current* PR title from the API (not the stale payload)
            const { data: freshPr } = await github.rest.pulls.get({
              owner, repo,
              pull_number: pr.number,
            });
            const currentTitle = freshPr.title;
            // Strip any existing version suffix (anywhere in the title, not just at end)
            const cleanTitle = currentTitle.replace(/\s*v\d+\.\d+\.\d+/g, '').trim();
            const newTitle = `${cleanTitle} v${version}`;
            if (currentTitle !== newTitle) {
              await github.rest.pulls.update({
                owner, repo,
                pull_number: pr.number,
                title: newTitle,
              });
            }

