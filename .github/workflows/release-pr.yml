name: Release PR вЂ” version bump, label + changelog

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches:
      - master

permissions:
  pull-requests: write
  contents: write   # needed to push the version-bump commit

jobs:
  label_and_changelog:
    runs-on: ubuntu-latest
    # Only run for develop -> master PRs
    if: github.head_ref == 'develop' && github.base_ref == 'master'

    steps:
      # в”Ђв”Ђ 1. Ensure the "release" label exists and add it в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Add release label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            // Create label if it doesn't exist yet (idempotent)
            try {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'release',
                color: '0075ca',
                description: 'Release to production',
              });
            } catch (e) {
              // 422 = already exists вЂ” ignore
              if (e.status !== 422) throw e;
            }

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: pr.number,
              labels: ['release'],
            });

      # в”Ђв”Ђ 2. Checkout develop branch (full history) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0   # full history needed for git log + push

      # в”Ђв”Ђ 3. Bump version in package.json (only on open/reopen) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Bump version and commit to develop
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');

            // в”Ђв”Ђ Determine bump type from commit subjects в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            const log = execSync(
              'git log origin/master..origin/develop --pretty=format:"%s" --no-merges'
            ).toString().trim();

            const lines = log ? log.split('\n') : [];
            let bump = 'patch';
            for (const subject of lines) {
              if (/^(\w+)(\(.*?\))?!:/.test(subject) || /BREAKING CHANGE/.test(subject)) {
                bump = 'major';
                break;
              }
              if (/^feat(\(.*?\))?:/.test(subject) && bump !== 'major') {
                bump = 'minor';
              }
            }
            console.log(`Bump type: ${bump}`);

            // в”Ђв”Ђ Read current version в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            const pkgPath = path.join(process.env.GITHUB_WORKSPACE, 'frontend/package.json');
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);

            let nextVersion;
            if (bump === 'major') nextVersion = `${major + 1}.0.0`;
            else if (bump === 'minor') nextVersion = `${major}.${minor + 1}.0`;
            else nextVersion = `${major}.${minor}.${patch + 1}`;

            console.log(`Version: ${pkg.version} в†’ ${nextVersion}`);

            // в”Ђв”Ђ Write new version в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            pkg.version = nextVersion;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

            // в”Ђв”Ђ Commit and push to develop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            execSync('git config user.name  "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync(`git add frontend/package.json`);
            execSync(`git commit -m "chore(release): bump version to ${nextVersion} [skip ci]"`);
            execSync('git push origin develop');

            // в”Ђв”Ђ Expose version for subsequent steps в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            // `core` is already injected as a global by actions/github-script
            core.exportVariable('NEXT_VERSION', nextVersion);

      # в”Ђв”Ђ 4. Read current version (on synchronize/edited) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Read current version
        if: github.event.action != 'opened' && github.event.action != 'reopened'
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "NEXT_VERSION=$VERSION" >> $GITHUB_ENV

      # в”Ђв”Ђ 5. Build changelog and update PR description в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Generate changelog and update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const version = process.env.NEXT_VERSION;

            // Commits in develop not yet in master
            const log = execSync(
              'git log origin/master..origin/develop --pretty=format:"%H|%s|%an" --no-merges'
            ).toString().trim();

            if (!log) {
              console.log('No new commits found.');
              return;
            }

            // Group by conventional-commit prefix
            const groups = {};
            const LABELS = {
              feat:     'вњЁ Features',
              fix:      'рџђ› Bug fixes',
              perf:     'вљЎ Performance',
              refactor: 'в™»пёЏ  Refactor',
              test:     'рџ§Є Tests',
              docs:     'рџ“ќ Docs',
              chore:    'рџ”§ Chore',
              ci:       'рџ‘· CI',
              style:    'рџ’„ Style',
            };

            for (const line of log.split('\n')) {
              const [sha, subject, author] = line.split('|');
              const match = subject.match(/^(\w+)(\(.*?\))?!?:/);
              const type  = match ? match[1] : 'other';
              const key   = LABELS[type] ?? 'рџ“¦ Other';
              if (!groups[key]) groups[key] = [];
              groups[key].push({ sha: sha.slice(0, 7), subject, author });
            }

            // Build markdown body
            let body = `## рџљЂ Release \`v${version}\`\n\n`;
            body += `## рџ“‹ Changelog\n\n`;
            body += `> Auto-generated from commits in \`develop\` not yet merged into \`master\`.\n\n`;

            for (const [section, commits] of Object.entries(groups)) {
              body += `### ${section}\n`;
              for (const { sha, subject, author } of commits) {
                body += `- [\`${sha}\`](../../commit/${sha}) ${subject} вЂ” _${author}_\n`;
              }
              body += '\n';
            }

            // Preserve any manually written content below the separator
            const existing = pr.body ?? '';
            const SEPARATOR = '<!-- changelog:end -->';
            const manualSection = existing.includes(SEPARATOR)
              ? existing.slice(existing.indexOf(SEPARATOR) + SEPARATOR.length)
              : '';

            const newBody = body + SEPARATOR + manualSection;

            await github.rest.pulls.update({
              owner, repo,
              pull_number: pr.number,
              body: newBody,
            });

            // Also update the PR title to include the version (if not already there)
            const currentTitle = pr.title;
            if (!currentTitle.includes(`v${version}`)) {
              const cleanTitle = currentTitle.replace(/\s*v\d+\.\d+\.\d+\s*$/, '').trim();
              await github.rest.pulls.update({
                owner, repo,
                pull_number: pr.number,
                title: `${cleanTitle} v${version}`,
              });
            }

